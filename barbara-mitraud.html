<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uma Mensagem do Cosmos</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #000000;
            color: #FFBF00;
            font-family: 'VT323', monospace;
            font-size: 25px;
            line-height: 1.7;
            margin: 0;
            padding: 20px;
            overflow-wrap: break-word; 
        }

        #cosmic-message {
            white-space: pre-wrap; 
        }

        .typed-cursor {
            opacity: 1;
            color: #FFBF00;
            animation: blink 0.8s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            cursor: pointer;
            z-index: 1000;
        }
        #start-overlay h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }
        #start-overlay p {
            font-size: 20px;
            animation: blink 1.5s infinite;
        }
    </style>
</head>
<body>

    <!-- Áudio apontando para o seu link no GitHub -->
    <audio id="background-static" loop>
        <!-- 👇 CÓDIGO AJUSTADO PARA O NOVO LINK 👇 -->
        <source src="https://spacerace2026.github.io/SpaceRace/spaceship.mp3" type="audio/mpeg">
        Seu navegador não suporta o elemento de áudio.
    </audio>

    <div id="start-overlay">
        <h1>SINAL CÓSMICO INTERCEPTADO PARA BARBARA MITRAUD</h1>
        <p>[ CLIQUE PARA INICIAR A TRANSMISSÃO ]</p>
    </div>

    <div id="cosmic-message"></div>

    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>

    <script>
        const startOverlay = document.getElementById('start-overlay');
        const backgroundAudio = document.getElementById('background-static');
        
        startOverlay.addEventListener('click', () => {
            startOverlay.style.display = 'none';

            backgroundAudio.play().catch(error => {
                console.error("Erro ao tentar tocar o áudio:", error);
            });

            startTransmission();
        });

        function startTransmission() {
            let scrollInterval;

            const options = {
                strings: [
    `> BUSCANDO FREQUÊNCIA CÓSMICA...^2000
    > SINAL DETECTADO...^1500 ORIGEM: O COSMOS.^2000
    > CARREGANDO REGISTRO ESTELAR...^2000
    > DESTINO: TRIPULANTE Alpha8539 - BARBARA MITRAUD.^3000

    Bárbara,

    Sei que 2025 não foi fácil, mas ter você ao meu lado me traz a certeza de que 2026 nos reserva apenas glórias. Sua coragem para dar um salto de fé rumo ao desconhecido me faz te admirar ainda mais, como uma astronauta destemida em busca de novas fronteiras. Sua dedicação diária, mesmo em meio ao desconforto, e o carinho que você coloca em todo o processo, nos abraçando mesmo em meio à sua timidez, me dão a certeza de que vamos superar este desafio e sair ainda mais fortes. 

    Em 2026, temos a missão de treinar pessoas, entregar grandes projetos e elevar o SnOP para um novo patamar, escrevendo nossos nomes nas estrelas! Você faz parte da nova geração, a geração de ouro do S&OP, que vai guiar essa nave rumo à orbitas nunca antes exploradas e resultados nunca antes atingidos.

    Como liderança, vai te exigir postura, mturidade, entrega e acima de tudo, unidade, com suas pares e o restante do CEI. Tenho certeza que ao final do ano, quando olharmos para traz, teremos orgulho do que construímos! Conte comigo nessa jornada estelar!

    Sou seu fã!

    Abraços,
    Rafa^1000
    .^1000
    .^1000
    .^1000
    > RECEBENDO REGISTROS COLETIVOS...^2000
    > ATIVANDO SEQUÊNCIA DE LANÇAMENTO...^2000
    > PASSO 1: VISTA SEU TRAJE DE VOO.^1000
    > PASSO 2: SINCRONIZE-SE COM A TRIPULAÇÃO.^1000
    > PASSO 3: AGUARDE O SINAL FINAL.^2000
    > A CONTAGEM REGRESSIVA PARA A SPACE RACE COMEÇOU.^2000
    > NOS VEMOS NA DECOLAGEM.^1000
    .^1000
    .^1000
    // FIM DO REGISTRO //`
                ],
                typeSpeed: 20,
                showCursor: true,
                cursorChar: '|',
                autoInsertCss: true,
                onComplete: (self) => {
                    clearInterval(scrollInterval);
                }
            };

            const typed = new Typed('#cosmic-message', options);

            scrollInterval = setInterval(() => {
                window.scrollTo(0, document.body.scrollHeight);
            }, 100);
        }
    </script>

</body>
</html>
